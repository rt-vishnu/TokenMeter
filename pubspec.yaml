name: prompt_penny
description: PromptPenny - AI token usage tracker and cost calculator with local API integration.
publish_to: 'none'

version: 1.0.2+3

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  drift: ^2.34.0
  sqlite3: ^3.3.2
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  network_info_plus: ^6.1.3
  qr_flutter: ^4.1.0
  fl_chart: ^0.70.2
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.2
  http: ^1.2.2
  basic_utils: ^5.7.0
  crypto: ^3.0.5
  mobile_scanner: ^5.2.3
  open_file: ^3.5.11
  url_launcher: ^6.3.2
  flutter_local_notifications: ^22.0.0
  flutter_markdown_plus: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.0
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.3

hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/icons/app_icon.png
    background_color: "#FFFFFF"
    theme_color: "#0D9488"
  windows:
    generate: true
    image_path: assets/icons/app_icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/icons/app_icon.png
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icons/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/pricing/models_pricing.json
